<style>
  :root {
    --white: #EDE9E4;   /* Crema — brand off-white */
    --off-white: #E6E1D9;
    --black: #46362B;   /* Robusta — brand coffee-brown ink */
    --dark: #46362B;
    --mid: #6B5A4D;     /* muted Robusta */
    --dim: #8a7a6c;
    --light: #A0958A;   /* warm Granite */
    --rule: #E0D9D0;    /* soft warm hairline */
    --hover: #E5DED4;   /* faint Cashew wash */
    --accent: #F28778;  /* Dulce Coral — signature accent */
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--white);
    color: var(--black);
    font-family: 'Good Sans', system-ui, -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1.25rem;
  }

  .card {
    width: 100%;
    max-width: 380px;
    padding: 0 0.5rem;
    animation: appear 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  @keyframes appear {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fade {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  /* ---- LOGO ---- */
  .logo-area {
    display: flex;
    justify-content: center;
    margin-bottom: 2.75rem;
    animation: fade 0.8s ease 0.1s both;
  }

  .logo-area img {
    width: auto;
    height: 56px;
  }

  /* ---- NAME ---- */
  .name {
    text-align: center;
    font-weight: 300;
    font-size: 1.5rem;
    letter-spacing: 0.04em;
    line-height: 1.3;
    color: var(--black);
    margin-bottom: 1.25rem;
    animation: fade 0.8s ease 0.2s both;
  }

  /* ---- DIVIDER ---- */
  .hr {
    width: 100%;
    height: 1px;
    background: var(--black);
    margin: 0 auto 1.25rem;
    animation: fade 0.8s ease 0.28s both;
  }

  /* ---- TITLES ---- */
  .titles {
    text-align: center;
    margin-bottom: 1.5rem;
    animation: fade 0.8s ease 0.34s both;
  }

  .titles p {
    font-family: 'Good Sans', system-ui, -apple-system, sans-serif;
    font-size: 0.68rem;
    font-weight: 400;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--mid);
    line-height: 2;
  }

  .titles .org {
    color: var(--black);
    font-weight: 500;
  }

  .titles .cred-link {
    color: inherit;
    text-decoration: none;
    transition: color 0.2s ease;
  }

  .titles .cred-link:hover,
  .titles .cred-link:focus-visible {
    color: var(--black);
    text-decoration: underline;
    text-underline-offset: 3px;
    text-decoration-thickness: 1px;
    outline: none;
  }

  /* ---- WRITING / PRESS ---- */
  .press {
    text-align: center;
    margin-bottom: 2.2rem;
    line-height: 1.55;
    animation: fade 0.8s ease 0.4s both;
  }

  .press .eyebrow {
    display: block;
    font-size: 0.56rem;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--light);
    margin-bottom: 0.5rem;
  }

  .press a {
    display: inline-block;
    max-width: 30ch;
    color: var(--dark);
    text-decoration: none;
    font-size: 0.8rem;
    font-weight: 400;
    letter-spacing: 0.01em;
    transition: color 0.25s ease;
  }

  .press a:hover,
  .press a:focus-visible {
    color: var(--accent);
    outline: none;
  }

  .press .press-arrow {
    display: inline-block;
    transition: transform 0.25s ease;
  }

  .press a:hover .press-arrow {
    transform: translateX(3px);
  }

  /* ---- CONTACT ICONS ---- */
  .icons {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 0.5rem;
    border-top: 1px solid var(--rule);
    padding-top: 1.85rem;
    margin-bottom: 2.4rem;
    animation: fade 0.6s ease 0.42s both;
  }

  .icons a {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 44px;
    height: 44px;
    color: var(--black);
    text-decoration: none;
    transition: color 0.25s ease, transform 0.25s ease;
  }

  .icons a:hover,
  .icons a:focus-visible {
    color: var(--accent);
    transform: translateY(-2px);
    outline: none;
  }

  .icons svg {
    width: 21px;
    height: 21px;
    fill: none;
    stroke: currentColor;
    stroke-width: 1.7;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  /* ---- SAVE BUTTON ---- */
  .save {
    display: block;
    width: 100%;
    padding: 0.95rem;
    background: transparent;
    color: var(--black);
    border: 1px solid var(--black);
    text-decoration: none;
    text-align: center;
    font-family: 'Good Sans', sans-serif;
    font-size: 0.62rem;
    font-weight: 500;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    transition: background 0.3s ease, color 0.3s ease, transform 0.1s ease;
    cursor: pointer;
    animation: fade 0.7s ease 0.68s both;
  }

  .save:hover,
  .save:focus-visible {
    background: var(--black);
    color: var(--white);
    outline: none;
  }

  .save:active {
    transform: scale(0.995);
  }

  /* ---- FOOTER ---- */
  .foot {
    margin-top: 2.25rem;
    text-align: center;
    animation: fade 0.7s ease 0.78s both;
  }

  .foot span {
    font-family: 'Good Sans', sans-serif;
    font-size: 0.52rem;
    font-weight: 300;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--light);
  }

  .foot .dot {
    display: inline-block;
    width: 3px;
    height: 3px;
    background: var(--accent);
    border-radius: 50%;
    margin: 0 0.75rem;
    vertical-align: middle;
  }

  @media (max-width: 380px) {
    .card { padding: 0 0.25rem; }
    .name { font-size: 1.35rem; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>
</head>
<body>
